agent_model:
  name: Qwen/Qwen3-4B-Instruct-2507
  type: qwen
  temperature: 0.6
  top_p: 0.6
  top_k: null
  max_length: 2048
  dtype: bf16

agents: null

critic_model:
  name: Qwen/Qwen3-4B-Instruct-2507
  type: qwen
  max_length: 2048
  dtype: bf16

critics: null

seed: 42

dataset:
  name: house_build
  type: house_build
  train_split: '[:8]'
  eval_split: '[8:]'
  json_path: ../dataset/data.json

prompt:
  use_chat_template: true

task:
  player:
    hp: 5
  spider:
    atk_high: 3
    atk_low: 1
    num: 3
  max_commands: 600
  limited_resource: true
  block_agent1:
  - white_concrete
  - obsidian
  - stone_stairs
  - stone_bricks
  - planks
  - air
  block_agent2:
  - white_concrete
  - obsidian
  - stone_stairs
  - stone_bricks
  - planks
  - air
  block_agent3:
  - white_concrete
  - obsidian
  - stone_stairs
  - stone_bricks
  - planks
  - air

output:
  base_dir: output_maac_house_build
  verbose: false
  save_final_model: false
  save_path: output_maac_house_build
  log_detailed_metrics: true
  log_raw_completions: true

external:
  mode: score_feedback
  original_prompt: true
  previous_response: true
  lim: 20
  external_prompt_passthrough: false

maac:
  parallel_training: none
  agent_devices:
  - cuda:0
  critic_devices:
  - cuda:0
  num_agents: 2
  num_turns: 4
  critic_type: v
  num_generations: 2
  num_train_epochs: 120
  agent_learning_rate: 5e-6
  critic_learning_rate: 3e-6
  value_loss_coef: 0.6
  rollout_buffer_size: 1
  train_batch_size: 1
  use_importance_ratio: true
  joint_critic_update: true
  policy_ratio_clip: null
  advantage_normalization: false
  advantage_clip: 0.05
  detailed_logging: true
  maac_detail_log_name: maac_paper_aligned_details.jsonl
  max_new_tokens: 512
  discount: 0.9
  early_termination_threshold: null
  eval_interval: 10
  eval_num_samples: 2
  eval_batch_size: 1
  logging_steps: 40

reward:
  mode: paper
  coverage_weight: 2.0
  redundancy_weight: 1.5
  spider_penalty_weight: 0.2

reward_processor:
  enabled: true
  scale_factor: 1.0
  shift: 0.0

wandb:
  project: house_build
  entity: OpenMLRL
  run_name: house_build_maac
  dir: output_maac_house_build
  tags:
  - collm-cc
  - maac
  - house_build
